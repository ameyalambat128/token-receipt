name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate workspace
        run: |
          bun run format
          git diff --exit-code
          bun run check

      - name: Build runtime artifacts
        run: bun run runtime:build:darwin-arm64

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            packages/runtime/dist/token-receipt-darwin-arm64.tar.gz \
            packages/runtime/dist/token-receipt-darwin-arm64.tar.gz.sha256 \
            --title "$TAG_NAME" \
            --generate-notes
